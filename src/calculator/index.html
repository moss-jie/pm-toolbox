<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>需求优先级打分器 · PM 工具箱</title>

  <style>
    /* ============================================
       整体风格：暗色主题，干净的工具感
       ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1117;
      /* GitHub 同款暗色背景 */
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 560px;
      /* 限制最大宽度，在大屏幕上不会撑太宽 */
    }

    /* --- 标题区 --- */
    h1 {
      font-size: 24px;
      margin-bottom: 4px;
    }
    .subtitle {
      color: #8b949e;
      font-size: 14px;
      margin-bottom: 32px;
    }

    /* --- 需求名称输入 --- */
    .name-input {
      width: 100%;
      padding: 12px 16px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      font-size: 16px;
      margin-bottom: 24px;
      outline: none;
      transition: border-color 0.2s;
    }
    .name-input:focus {
      border-color: #58a6ff;
      /* 聚焦时边框变蓝，给用户视觉反馈 */
    }
    .name-input::placeholder {
      color: #484f58;
    }

    /* --- 评分维度（5个滑块） --- */
    .criteria-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 28px;
    }

    .criterion {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 16px 20px;
    }

    /* 每个维度的顶部：名称 + 分数 + 权重 */
    .criterion-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .criterion-name {
      font-size: 15px;
      font-weight: 600;
    }
    .criterion-meta {
      font-size: 12px;
      color: #8b949e;
    }
    .criterion-score {
      font-size: 20px;
      font-weight: 700;
      color: #58a6ff;
      min-width: 24px;
      text-align: right;
    }

    /* --- 滑块样式 --- */
    input[type="range"] {
      /* range = 滑块输入 */
      -webkit-appearance: none;
      /* 去掉浏览器默认样式 */
      width: 100%;
      height: 6px;
      background: #21262d;
      border-radius: 3px;
      outline: none;
    }
    /* 滑块上的圆点 */
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: #58a6ff;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    /* --- 结果区域 --- */
    .result-box {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }
    .result-label {
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 6px;
    }
    .result-score {
      font-size: 48px;
      font-weight: 800;
      color: #7ee787;
      /* 绿色分数 */
    }
    .result-bar-wrap {
      margin-top: 12px;
      background: #21262d;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    .result-bar {
      height: 100%;
      background: linear-gradient(90deg, #f85149, #d29922, #7ee787);
      /* 红 → 黄 → 绿渐变 */
      border-radius: 4px;
      transition: width 0.3s;
      /* 宽度变化有平滑动画 */
    }
    .result-verdict {
      margin-top: 10px;
      font-size: 15px;
      font-weight: 600;
    }

    /* --- 已保存的需求列表 --- */
    .saved-section {
      margin-top: 32px;
    }
    .saved-section h2 {
      font-size: 18px;
      margin-bottom: 12px;
    }
    .saved-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .saved-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
    }
    .saved-item .s-name {
      flex: 1;
    }
    .saved-item .s-score {
      font-weight: 700;
      margin-right: 12px;
    }
    .saved-item .s-delete {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
    }
    .saved-item .s-delete:hover {
      color: #f85149;
      border-color: #f85149;
    }

    .btn-save {
      width: 100%;
      padding: 12px;
      background: #238636;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.2s;
    }
    .btn-save:hover {
      background: #2ea043;
    }

    /* 提示文案 */
    .empty-hint {
      color: #484f58;
      font-size: 14px;
      text-align: center;
      padding: 24px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>📊 需求优先级打分器</h1>
    <p class="subtitle">拖动滑块对每个维度打分，加权算出综合优先级</p>

    <!-- 需求名称 -->
    <input
      type="text"
      class="name-input"
      id="reqName"
      placeholder="输入需求名称，比如「用户反馈智能分类」"
    >

    <!-- 5 个评分维度 -->
    <div class="criteria-list" id="criteriaList">
      <!--
        每个维度的 HTML 结构：
        <div class="criterion">
          <div class="criterion-header">
            <span class="criterion-name">维度名</span>
            <span class="criterion-meta">权重: %</span>
            <span class="criterion-score">分数</span>
          </div>
          <input type="range" min="1" max="5" value="3">
        </div>
        但我们用 JS 动态生成，这样以后改维度只需改数据，不用改 HTML
      -->
    </div>

    <!-- 保存按钮 -->
    <button class="btn-save" id="btnSave">💾 保存这个需求</button>

    <!-- 实时结果 -->
    <div class="result-box" id="resultBox">
      <div class="result-label">综合得分</div>
      <div class="result-score" id="resultScore">3.0</div>
      <div class="result-bar-wrap">
        <div class="result-bar" id="resultBar" style="width: 60%;"></div>
      </div>
      <div class="result-verdict" id="resultVerdict">中等优先级</div>
    </div>

    <!-- 已保存的需求列表 -->
    <div class="saved-section">
      <h2>📋 已保存的需求</h2>
      <div class="saved-list" id="savedList">
        <div class="empty-hint">还没有保存任何需求，打分后点保存</div>
      </div>
    </div>
  </div>

  <!--
    script 标签 = JavaScript 代码写在这里
    JavaScript = 网页的「行为层」
    HTML = 有什么（骨架）
    CSS = 长什么样（皮肤）
    JavaScript = 能干什么（肌肉）
  -->
  <script>
    // ============================================================
    // 数据定义 —— 如果以后想改评分维度，只改这里就行
    // ============================================================

    // 数组 = 一组数据，用方括号 [] 包裹，每项用逗号分隔
    const criteria = [
      { id: 'userValue',   name: '用户价值',   weight: 30, emoji: '👤' },
      { id: 'bizValue',    name: '商业价值',   weight: 25, emoji: '💰' },
      { id: 'devCost',     name: '开发成本',   weight: 20, emoji: '⚙️' },
      // 开发成本是反向指标：成本越低分数越高
      { id: 'urgency',     name: '紧急程度',   weight: 15, emoji: '🔥' },
      { id: 'strategy',    name: '战略契合度', weight: 10, emoji: '🎯' },
    ];

    // ============================================================
    // 第一步：动态生成评分维度 HTML
    // ============================================================

    const criteriaList = document.getElementById('criteriaList');
    // document.getElementById = 找到页面上的某个元素
    // PM 类比：就像在 Figma 图层面板里选中一个图层

    criteria.forEach((item) => {
      // forEach = 对数组的每一项执行以下操作
      // 相当于：遍历每个维度，逐一创建 HTML 并插入页面

      const div = document.createElement('div');
      // createElement = 创建一个新的 HTML 元素
      div.className = 'criterion';
      // className = 设置 CSS class

      // 用模板字符串拼出内部 HTML
      div.innerHTML = `
        <div class="criterion-header">
          <span class="criterion-name">${item.emoji} ${item.name}</span>
          <span class="criterion-meta">权重 ${item.weight}%</span>
          <span class="criterion-score" id="score-${item.id}">3</span>
        </div>
        <input
          type="range"
          min="1"
          max="5"
          value="3"
          id="slider-${item.id}"
          data-weight="${item.weight}"
        >
      `;
      // id="score-用户价值" → 方便后面找到并更新分数显示
      // data-weight = 自定义属性，存储权重值，JS 里能读出来

      criteriaList.appendChild(div);
      // appendChild = 把这个 div 加到页面上
    });

    // ============================================================
    // 第二步：监听滑块变化 → 实时更新分数 + 总分
    // ============================================================

    // querySelectorAll = 找到页面上所有匹配的元素
    const sliders = document.querySelectorAll('input[type="range"]');

    sliders.forEach((slider) => {
      // addEventListener = 监听事件
      // 'input' = 滑块拖动的时候触发
      // (e) => {...} = 事件发生后执行这个函数（箭头函数）
      slider.addEventListener('input', () => {
        // ① 更新当前维度的分数显示
        const critId = slider.id.replace('slider-', '');
        // replace = 把 'slider-用户价值' 变成 '用户价值'
        const scoreSpan = document.getElementById(`score-${critId}`);
        scoreSpan.textContent = slider.value;
        // textContent = 改变元素里的文字

        // ② 重新计算总分
        updateTotalScore();
      });
    });

    // ============================================================
    // 第三步：计算加权总分
    // ============================================================

    function updateTotalScore() {
      // function = 定义一个函数，给一段代码起个名字，以后可以反复调用
      // PM 类比：就像 SOP 里一个独立步骤，每次打分完调用它

      let weightedSum = 0;
      // let = 声明一个会变的变量（const 是不能变的）
      let totalWeight = 0;

      sliders.forEach((slider) => {
        const weight = parseInt(slider.dataset.weight);
        // parseInt = 把"30"这种字符串变成数字 30
        // dataset.weight = 读取 data-weight 属性的值

        const value = parseInt(slider.value);

        weightedSum += value * weight;
        // += 是简写：weightedSum = weightedSum + (value × weight)

        totalWeight += weight;
      });

      // 加权平均 = 每项(分数 × 权重) 之和 ÷ 权重之和
      const finalScore = (weightedSum / totalWeight).toFixed(1);
      // toFixed(1) = 保留 1 位小数，如 "3.7"

      // ③ 更新 UI
      document.getElementById('resultScore').textContent = finalScore;

      // 进度条：1→5 映射到 20%→100%
      const barWidth = (finalScore / 5) * 100;
      document.getElementById('resultBar').style.width = barWidth + '%';

      // 评级文案
      let verdict, verdictColor;
      if (finalScore >= 4.0) {
        verdict = '🔥 高优先级 —— 建议本迭代做';
        verdictColor = '#7ee787';
      } else if (finalScore >= 2.5) {
        verdict = '🟡 中等优先级 —— 排期做';
        verdictColor = '#d29922';
      } else {
        verdict = '🔵 低优先级 —— 放入 Backlog';
        verdictColor = '#58a6ff';
      }
      const verdictEl = document.getElementById('resultVerdict');
      verdictEl.textContent = verdict;
      verdictEl.style.color = verdictColor;
    }

    // ============================================================
    // 第四步：保存需求到列表
    // ============================================================

    const savedList = document.getElementById('savedList');
    const btnSave = document.getElementById('btnSave');
    const reqNameInput = document.getElementById('reqName');

    btnSave.addEventListener('click', () => {
      // 获取需求名称，没填就给默认值
      let name = reqNameInput.value.trim();
      // trim() = 去掉首尾空格
      if (!name) {
        name = '未命名需求';
      }

      // 获取当前得分
      const score = document.getElementById('resultScore').textContent;

      // 获取各维度分数（用于显示详情）
      const details = [];
      sliders.forEach((slider) => {
        const critId = slider.id.replace('slider-', '');
        const crit = criteria.find(c => c.id === critId);
        // find = 在数组里找到第一个符合条件的元素
        details.push(`${crit.emoji}${crit.name}:${slider.value}`);
      });

      // 创建列表项
      const item = document.createElement('div');
      item.className = 'saved-item';
      item.innerHTML = `
        <span class="s-name">${name}
          <span style="color:#8b949e;font-size:12px;margin-left:8px;">
            ${details.join(' | ')}
          </span>
        </span>
        <span class="s-score" style="color:${score >= 4 ? '#7ee787' : score >= 2.5 ? '#d29922' : '#58a6ff'}">
          ${score}
        </span>
        <button class="s-delete">删除</button>
      `;

      // 删除按钮事件
      item.querySelector('.s-delete').addEventListener('click', () => {
        item.remove();
        // remove() = 把这个元素从页面删除
        checkEmpty();
      });

      // 加到列表最前面
      savedList.prepend(item);
      // prepend = 插入到第一个位置

      // 清空输入框，方便输入下一个需求
      reqNameInput.value = '';
      reqNameInput.focus();
      // focus() = 让输入框获得焦点，光标自动进去

      checkEmpty();
    });

    // 如果列表空了，显示提示文字
    function checkEmpty() {
      const emptyHint = savedList.querySelector('.empty-hint');
      const items = savedList.querySelectorAll('.saved-item');

      if (items.length === 0 && !emptyHint) {
        const hint = document.createElement('div');
        hint.className = 'empty-hint';
        hint.textContent = '还没有保存任何需求，打分后点保存';
        savedList.appendChild(hint);
      } else if (items.length > 0 && emptyHint) {
        emptyHint.remove();
      }
    }

    // ============================================================
    // 初始化：页面加载完后算一次总分
    // ============================================================
    updateTotalScore();

    // ============================================================
    // 🎓 你刚刚学到的新能力：
    //   document.getElementById() → 选中页面元素
    //   document.createElement()  → 动态创建元素
    //   addEventListener('input') → 监听用户操作
    //   数组 forEach / find         → 遍历和查找数据
    //   parseInt / toFixed         → 数字处理
    //   模板字符串 ${}              → 拼 HTML
    // ============================================================
  </script>

</body>

</html>
