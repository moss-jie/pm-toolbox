<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日工作日志 · PM 工具箱</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
      padding: 30px 20px;
      min-height: 100vh;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1100px;
      margin: 0 auto 20px;
    }
    .top-bar h1 { font-size: 22px; }
    .top-bar .date-badge {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 14px;
      color: #58a6ff;
    }

    /* 左右布局 */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .panel {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 20px;
    }
    .panel h2 { font-size: 16px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #21262d; }

    /* 左面板：输入 */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }
    textarea {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 13px;
      padding: 10px;
      resize: vertical;
      font-family: inherit;
      outline: none;
    }
    textarea:focus { border-color: #58a6ff; }
    textarea::placeholder { color: #484f58; }
    textarea.tall { min-height: 80px; }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .btn-save   { background: #238636; color: white; }
    .btn-save:hover { background: #2ea043; }
    .btn-export { background: #1f6feb; color: white; }
    .btn-export:hover { background: #388bfd; }
    .btn-clear  { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
    .btn-clear:hover { background: #30363d; }

    /* 右面板：预览 */
    .preview-content {
      background: #0d1117;
      border-radius: 6px;
      padding: 16px;
      font-size: 13px;
      line-height: 1.7;
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .preview-content h1 { font-size: 18px; margin-bottom: 8px; }
    .preview-content h2 { font-size: 15px; margin: 14px 0 6px; border: none; padding: 0; }

    /* 底部：历史记录 */
    .history-section {
      max-width: 1100px;
      margin: 20px auto 0;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 20px;
    }
    .history-section h2 { font-size: 16px; margin-bottom: 14px; }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .history-item:hover { border-color: #58a6ff; }
    .history-item .h-date { font-weight: 600; color: #58a6ff; }
    .history-item .h-preview { color: #8b949e; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-item .h-actions { display: flex; gap: 6px; }
    .h-btn {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
    }
    .h-btn:hover { background: #30363d; }
    .h-btn.danger { color: #f85149; border-color: #f85149; }
    .h-btn.danger:hover { background: rgba(248,81,73,0.1); }

    .empty-hint { color: #484f58; font-size: 14px; text-align: center; padding: 20px; }

    /* 亮色 */
    body.light { background: #f6f8fa; color: #1f2328; }
    body.light .top-bar .date-badge { background: #ffffff; border-color: #d0d7de; color: #0969da; }
    body.light .panel,
    body.light .history-section { background: #ffffff; border-color: #d0d7de; }
    body.light .panel h2,
    body.light .history-section h2 { border-bottom-color: #d0d7de; }
    body.light textarea { background: #f6f8fa; border-color: #d0d7de; color: #1f2328; }
    body.light textarea:focus { border-color: #0969da; }
    body.light .preview-content { background: #f6f8fa; }
    body.light .btn-clear { background: #f6f8fa; border-color: #d0d7de; color: #1f2328; }
    body.light .history-item { background: #f6f8fa; border-color: #d0d7de; }
    body.light .history-item .h-date { color: #0969da; }
    body.light .history-item .h-preview { color: #656d76; }
    body.light .h-btn { background: #f6f8fa; border-color: #d0d7de; color: #1f2328; }

    .theme-toggle {
      position: fixed;
      top: 20px; right: 20px;
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid #30363d;
      background: #161b22;
      color: #c9d1d9;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    body.light .theme-toggle { background: #ffffff; border-color: #d0d7de; color: #1f2328; }

    @media (max-width: 700px) {
      .main-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>

  <div class="top-bar">
    <h1>📝 每日工作日志</h1>
    <span class="date-badge" id="dateBadge"></span>
  </div>

  <div class="main-layout">
    <!-- 左：输入 -->
    <div class="panel">
      <h2>✍️ 填写今日日志</h2>
      <div class="field">
        <label>✅ 今日完成</label>
        <textarea id="done" class="tall" placeholder="每行一项"></textarea>
      </div>
      <div class="field">
        <label>🧠 技术收获</label>
        <textarea id="learned" class="tall" placeholder="今天学到了什么"></textarea>
      </div>
      <div class="field">
        <label>🔜 明天计划</label>
        <textarea id="plan" placeholder="明天打算做什么"></textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-save" id="btnSave">💾 保存</button>
        <button class="btn btn-export" id="btnExportMD">📥 Markdown</button>
        <button class="btn btn-export" id="btnExportCSV">📊 CSV</button>
        <button class="btn btn-export" id="btnExportTXT">📄 文本</button>
        <button class="btn btn-clear" id="btnClear">🔄 清空</button>
      </div>
      <div style="margin-top:8px;font-size:11px;color:#484f58;" id="saveHint"></div>
    </div>

    <!-- 右：预览 -->
    <div class="panel">
      <h2>👁️ 实时预览</h2>
      <div class="preview-content" id="previewContent">在左边填写内容，这里实时显示 Markdown 预览…</div>
    </div>
  </div>

  <!-- 历史记录 -->
  <div class="history-section">
    <h2>📚 历史日志</h2>
    <div class="history-list" id="historyList">
      <div class="empty-hint">还没有保存过日志</div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'pm_logs';
    const now = new Date();
    const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    document.getElementById('dateBadge').textContent = `📅 ${today}`;

    // ============================================================
    // 数据存取
    // ============================================================
    function getAllLogs() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }
    function saveAllLogs(logs) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
    }

    function buildMarkdown(data) {
      const doneList = data.done ? data.done.split('\n').map(l => `- [x] ${l.trim()}`).join('\n') : '- [ ] ';
      const learnedList = data.learned ? data.learned.split('\n').map(l => `- ${l.trim()}`).join('\n') : '- ';
      const planList = data.plan ? data.plan.split('\n').map(l => `- [ ] ${l.trim()}`).join('\n') : '- [ ] ';
      return `# 📋 每日工作日志 — ${data.date || today}

> 由 PM 工具箱自动生成 🎉

## ✅ 今日完成
${doneList}

## 🧠 技术收获
${learnedList}

## 🔜 明天计划
${planList}

---
*生成时间：${new Date().toLocaleTimeString('zh-CN')}*
`;
    }

    // 加载今天的日志
    function loadToday() {
      const logs = getAllLogs();
      if (logs[today]) {
        document.getElementById('done').value = logs[today].done || '';
        document.getElementById('learned').value = logs[today].learned || '';
        document.getElementById('plan').value = logs[today].plan || '';
      }
      updatePreview();
    }

    // 实时预览
    function updatePreview() {
      const data = {
        date: today,
        done: document.getElementById('done').value,
        learned: document.getElementById('learned').value,
        plan: document.getElementById('plan').value,
      };
      document.getElementById('previewContent').textContent = buildMarkdown(data);
    }

    // 保存
    document.getElementById('btnSave').addEventListener('click', () => {
      const logs = getAllLogs();
      logs[today] = {
        done: document.getElementById('done').value,
        learned: document.getElementById('learned').value,
        plan: document.getElementById('plan').value,
        savedAt: new Date().toISOString(),
      };
      saveAllLogs(logs);
      document.getElementById('saveHint').textContent = '✅ 已保存 ' + new Date().toLocaleTimeString('zh-CN');
      renderHistory();
    });

    // 实时预览
    ['done','learned','plan'].forEach(id => {
      document.getElementById(id).addEventListener('input', updatePreview);
    });

    // 获取当前数据
    function getCurrentData() {
      return {
        date: today,
        done: document.getElementById('done').value,
        learned: document.getElementById('learned').value,
        plan: document.getElementById('plan').value,
      };
    }

    function downloadFile(content, filename, mimeType) {
      const blob = new Blob(['\uFEFF' + content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function autoSave() {
      const data = getCurrentData();
      const logs = getAllLogs();
      logs[today] = data;
      saveAllLogs(logs);
      renderHistory();
    }

    // 导出 Markdown
    document.getElementById('btnExportMD').addEventListener('click', () => {
      const md = buildMarkdown(getCurrentData());
      downloadFile(md, `pm-log-${today}.md`, 'text/markdown');
      autoSave();
    });

    // 导出 CSV
    document.getElementById('btnExportCSV').addEventListener('click', () => {
      const data = getCurrentData();
      const doneItems = data.done ? data.done.split('\n').map(l => l.trim()).filter(Boolean) : [];
      const learnedItems = data.learned ? data.learned.split('\n').map(l => l.trim()).filter(Boolean) : [];
      const planItems = data.plan ? data.plan.split('\n').map(l => l.trim()).filter(Boolean) : [];
      const maxRows = Math.max(doneItems.length, learnedItems.length, planItems.length, 1);

      let csv = '类别,内容\n';
      for (let i = 0; i < maxRows; i++) {
        if (doneItems[i]) csv += `✅ 今日完成,"${doneItems[i]}"\n`;
        if (learnedItems[i]) csv += `🧠 技术收获,"${learnedItems[i]}"\n`;
        if (planItems[i]) csv += `🔜 明天计划,"${planItems[i]}"\n`;
      }
      downloadFile(csv, `pm-log-${today}.csv`, 'text/csv');
      autoSave();
    });

    // 导出纯文本
    document.getElementById('btnExportTXT').addEventListener('click', () => {
      const data = getCurrentData();
      let txt = `每日工作日志 — ${today}\n`;
      txt += '═'.repeat(40) + '\n\n';
      txt += '✅ 今日完成\n';
      txt += (data.done || '(无)') + '\n\n';
      txt += '🧠 技术收获\n';
      txt += (data.learned || '(无)') + '\n\n';
      txt += '🔜 明天计划\n';
      txt += (data.plan || '(无)') + '\n\n';
      txt += `生成时间：${new Date().toLocaleString('zh-CN')}\n`;
      downloadFile(txt, `pm-log-${today}.txt`, 'text/plain');
      autoSave();
    });

    // 清空
    document.getElementById('btnClear').addEventListener('click', () => {
      document.getElementById('done').value = '';
      document.getElementById('learned').value = '';
      document.getElementById('plan').value = '';
      updatePreview();
      document.getElementById('saveHint').textContent = '';
    });

    // ============================================================
    // 历史记录
    // ============================================================
    function renderHistory() {
      const logs = getAllLogs();
      const dates = Object.keys(logs).sort().reverse(); // 最新在前
      const list = document.getElementById('historyList');

      if (dates.length === 0) {
        list.innerHTML = '<div class="empty-hint">还没有保存过日志</div>';
        return;
      }

      list.innerHTML = dates.map(date => {
        const log = logs[date];
        const firstLine = (log.done || '').split('\n')[0] || '(空)';
        return `
          <div class="history-item">
            <span class="h-date">📅 ${date}</span>
            <span class="h-preview">${firstLine.slice(0, 50)}</span>
            <span class="h-actions">
              <button class="h-btn" data-date="${date}" data-action="load">📂 加载</button>
              <button class="h-btn" data-date="${date}" data-action="export">📥 导出</button>
              <button class="h-btn danger" data-date="${date}" data-action="delete">🗑</button>
            </span>
          </div>
        `;
      }).join('');

      // 绑定事件
      list.querySelectorAll('.h-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const date = btn.dataset.date;
          const action = btn.dataset.action;

          if (action === 'load') {
            const logs = getAllLogs();
            if (confirm(`加载 ${date} 的日志到编辑区？当前未保存的内容会丢失。`)) {
              document.getElementById('done').value = logs[date].done || '';
              document.getElementById('learned').value = logs[date].learned || '';
              document.getElementById('plan').value = logs[date].plan || '';
              updatePreview();
              document.getElementById('dateBadge').textContent = `📅 正在编辑：${date}`;
              document.getElementById('saveHint').textContent = '⚠️ 注意：你正在编辑历史日志，保存将覆盖原内容';
            }
          } else if (action === 'export') {
            const logs = getAllLogs();
            const md = buildMarkdown({ ...logs[date], date });
            const blob = new Blob(['\uFEFF' + md], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pm-log-${date}.md`;
            a.click();
            URL.revokeObjectURL(url);
          } else if (action === 'delete') {
            if (confirm(`删除 ${date} 的日志？不可恢复。`)) {
              const logs = getAllLogs();
              delete logs[date];
              saveAllLogs(logs);
              renderHistory();
            }
          }
        });
      });
    }

    // 主题
    const toggle = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light');
      toggle.textContent = '☀️';
    }
    toggle.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light');
      toggle.textContent = isLight ? '☀️' : '🌙';
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });

    // 初始化
    loadToday();
    renderHistory();
  </script>

</body>

</html>
