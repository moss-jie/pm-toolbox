<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日工作日志 · PM 工具箱</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .container { width: 100%; max-width: 650px; }

    h1 { font-size: 24px; margin-bottom: 4px; }
    .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 24px; }

    .section {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .section label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      font-size: 14px;
      padding: 10px;
      resize: vertical;
      font-family: inherit;
      outline: none;
      min-height: 80px;
    }
    textarea:focus { border-color: #58a6ff; }
    textarea::placeholder { color: #484f58; }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .btn-primary { background: #238636; color: white; flex: 1; }
    .btn-primary:hover { background: #2ea043; }
    .btn-export { background: #1f6feb; color: white; }
    .btn-export:hover { background: #388bfd; }
    .btn-clear { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
    .btn-clear:hover { background: #30363d; }

    .preview {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 20px;
      margin-top: 16px;
      display: none;
    }
    .preview h2 { font-size: 18px; margin-bottom: 12px; }
    .preview-content {
      background: #0d1117;
      border-radius: 6px;
      padding: 16px;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      max-height: 500px;
      overflow-y: auto;
    }

    /* 亮色 */
    body.light { background: #f6f8fa; color: #1f2328; }
    body.light .subtitle { color: #656d76; }
    body.light .section,
    body.light .preview { background: #ffffff; border-color: #d0d7de; }
    body.light textarea {
      background: #f6f8fa;
      border-color: #d0d7de;
      color: #1f2328;
    }
    body.light textarea:focus { border-color: #0969da; }
    body.light .btn-clear { background: #f6f8fa; border-color: #d0d7de; color: #1f2328; }
    body.light .preview-content { background: #f6f8fa; }

    .theme-toggle {
      position: fixed;
      top: 20px; right: 20px;
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid #30363d;
      background: #161b22;
      color: #c9d1d9;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    body.light .theme-toggle { background: #ffffff; border-color: #d0d7de; color: #1f2328; }
  </style>
</head>

<body>

  <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>

  <div class="container">
    <h1>📝 每日工作日志</h1>
    <p class="subtitle" id="dateDisplay"></p>

    <div class="section">
      <label>✅ 今日完成</label>
      <textarea id="done" placeholder="每行一项，例如：
完成需求优先级打分器
学习 HTML/CSS/JS 三件套
推了 9 个 commit 到 GitHub"></textarea>
    </div>

    <div class="section">
      <label>🧠 技术收获</label>
      <textarea id="learned" placeholder="今天学到了什么新技术或心得"></textarea>
    </div>

    <div class="section">
      <label>🔜 明天计划</label>
      <textarea id="plan" placeholder="明天打算做什么"></textarea>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btnPreview">👁️ 预览</button>
      <button class="btn btn-export" id="btnExport">📥 导出 Markdown</button>
      <button class="btn btn-clear" id="btnClear">🔄 清空</button>
    </div>

    <div class="preview" id="previewBox">
      <h2>📋 预览</h2>
      <div class="preview-content" id="previewContent"></div>
    </div>
  </div>

  <script>
    const now = new Date();
    const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    document.getElementById('dateDisplay').textContent = `📅 ${dateStr}`;

    function buildMarkdown() {
      const done = document.getElementById('done').value.trim();
      const learned = document.getElementById('learned').value.trim();
      const plan = document.getElementById('plan').value.trim();

      const doneList = done ? done.split('\n').map(l => `- [x] ${l.trim()}`).join('\n') : '- [ ] ';
      const learnedList = learned ? learned.split('\n').map(l => `- ${l.trim()}`).join('\n') : '- ';
      const planList = plan ? plan.split('\n').map(l => `- [ ] ${l.trim()}`).join('\n') : '- [ ] ';

      return `# 📋 每日工作日志 — ${dateStr}

> 由默默的工具箱自动生成 🎉

## ✅ 今日完成
${doneList}

## 🧠 技术收获
${learnedList}

## 🔜 明天计划
${planList}

---
*生成时间：${now.toLocaleTimeString('zh-CN')}*
`;
    }

    document.getElementById('btnPreview').addEventListener('click', () => {
      const md = buildMarkdown();
      document.getElementById('previewContent').textContent = md;
      document.getElementById('previewBox').style.display = 'block';
    });

    document.getElementById('btnExport').addEventListener('click', () => {
      const md = buildMarkdown();
      const blob = new Blob(['\uFEFF' + md], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `pm-log-${dateStr}.md`;
      a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById('btnClear').addEventListener('click', () => {
      document.getElementById('done').value = '';
      document.getElementById('learned').value = '';
      document.getElementById('plan').value = '';
      document.getElementById('previewBox').style.display = 'none';
    });

    // 自动加载今天已有的日志（如果之前导出过，试试 localStorage）
    const saved = localStorage.getItem(`log_${dateStr}`);
    if (saved) {
      const data = JSON.parse(saved);
      document.getElementById('done').value = data.done || '';
      document.getElementById('learned').value = data.learned || '';
      document.getElementById('plan').value = data.plan || '';
    }

    // 自动保存（输入框失焦时保存到 localStorage）
    function autoSave() {
      const data = {
        done: document.getElementById('done').value,
        learned: document.getElementById('learned').value,
        plan: document.getElementById('plan').value,
      };
      localStorage.setItem(`log_${dateStr}`, JSON.stringify(data));
    }
    ['done','learned','plan'].forEach(id => {
      document.getElementById(id).addEventListener('blur', autoSave);
    });

    // 主题
    const toggle = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light');
      toggle.textContent = '☀️';
    }
    toggle.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light');
      toggle.textContent = isLight ? '☀️' : '🌙';
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });
  </script>

</body>

</html>
