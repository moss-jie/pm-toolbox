<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRD → 开发任务 · PM 工具箱</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .container { width: 100%; max-width: 1100px; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
    }

    h1 { font-size: 24px; margin-bottom: 4px; }
    .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 24px; }

    /* --- 输入区 --- */
    .input-section {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .input-section label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .prd-input {
      width: 100%;
      height: 200px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      font-size: 14px;
      padding: 12px;
      resize: vertical;
      font-family: inherit;
      outline: none;
      margin-bottom: 12px;
    }
    .prd-input:focus { border-color: #58a6ff; }
    .prd-input::placeholder { color: #484f58; }

    .example-btn, .import-btn {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-bottom: 8px;
      margin-right: 8px;
    }
    .example-btn:hover, .import-btn:hover { color: #58a6ff; border-color: #58a6ff; }
    .import-btn { color: #7ee787; border-color: #238636; }
    .import-btn:hover { color: #7ee787; border-color: #2ea043; }
    #fileInput { display: none; }

    .btn-row { display: flex; gap: 8px; }
    .btn-convert, .btn-ai {
      flex: 1;
      padding: 10px;
      background: #1f6feb;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-convert:hover { background: #388bfd; }
    .btn-convert:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    .btn-ai { background: #6e40c9; }
    .btn-ai:hover { background: #8957e5; }
    .btn-ai:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

    .api-key-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .api-key-input {
      flex: 1;
      padding: 8px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      font-size: 13px;
      outline: none;
      font-family: monospace;
    }
    .api-key-input:focus { border-color: #6e40c9; }
    .api-key-input::placeholder { color: #484f58; }
    .api-key-save {
      padding: 8px 16px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .api-key-save:hover { background: #30363d; }
    .api-key-status {
      font-size: 11px;
      margin-bottom: 8px;
      color: #238636;
    }
    body.light .api-key-input {
      background: #f6f8fa;
      border-color: #d0d7de;
      color: #1f2328;
    }
    body.light .api-key-input:focus { border-color: #6e40c9; }
    body.light .api-key-save {
      background: #f6f8fa;
      border-color: #d0d7de;
      color: #1f2328;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- 结果区 --- */
    .result-section { /* 始终可见 */ }

    .summary-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .summary-item {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      flex: 1;
      min-width: 100px;
      text-align: center;
    }
    .summary-item .s-num {
      font-size: 24px;
      font-weight: 700;
      color: #58a6ff;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .task-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 16px 20px;
    }
    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .task-title {
      font-size: 15px;
      font-weight: 600;
    }
    .task-estimate {
      background: #21262d;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      color: #8b949e;
      white-space: nowrap;
    }
    .task-desc {
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 10px;
    }
    .task-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tag {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .tag-type   { background: rgba(88,166,255,0.15); color: #58a6ff; }
    .tag-p0     { background: rgba(248,81,73,0.15);  color: #f85149; }
    .tag-p1     { background: rgba(210,153,34,0.15); color: #d29922; }
    .tag-p2     { background: rgba(88,166,255,0.15); color: #58a6ff; }

    .export-bar {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .btn-export {
      padding: 10px 20px;
      background: #238636;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-export:hover { background: #2ea043; }
    .btn-clear {
      padding: 10px 20px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-clear:hover { background: #30363d; }

    /* ============================================
       亮色模式
       ============================================ */
    body.light {
      background: #f6f8fa;
      color: #1f2328;
    }
    body.light .subtitle { color: #656d76; }
    body.light .input-section,
    body.light .summary-item,
    body.light .task-card {
      background: #ffffff;
      border-color: #d0d7de;
    }
    body.light .prd-input {
      background: #f6f8fa;
      border-color: #d0d7de;
      color: #1f2328;
    }
    body.light .prd-input:focus { border-color: #0969da; }
    body.light .prd-input::placeholder { color: #8b949e; }
    body.light .task-desc { color: #656d76; }
    body.light .task-estimate { background: #f6f8fa; color: #656d76; }
    body.light .btn-clear { background: #f6f8fa; border-color: #d0d7de; color: #1f2328; }
    body.light .summary-item .s-num { color: #0969da; }
    body.light .tag-type { background: rgba(9,105,218,0.1); color: #0969da; }
    body.light .tag-p2  { background: rgba(9,105,218,0.1); color: #0969da; }

    .back-btn {
      position: fixed;
      top: 20px; left: 20px;
      padding: 8px 14px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #8b949e;
      text-decoration: none;
      font-size: 13px;
      z-index: 999;
      transition: all 0.2s;
    }
    .back-btn:hover { color: #58a6ff; border-color: #58a6ff; }
    body.light .back-btn { background: #ffffff; border-color: #d0d7de; color: #656d76; }
    body.light .back-btn:hover { color: #0969da; border-color: #0969da; }

    .theme-toggle {
      position: fixed;
      top: 20px; right: 20px;
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid #30363d;
      background: #161b22;
      color: #c9d1d9;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    body.light .theme-toggle {
      background: #ffffff;
      border-color: #d0d7de;
      color: #1f2328;
    }
  </style>
</head>

<body>

  <a href="../../index.html" class="back-btn" title="返回导航页">← 返回</a>
  <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>

  <div class="container">
    <h1>📋 PRD → 开发任务转换器</h1>
    <p class="subtitle">粘贴你的 PRD 文本，自动拆解为可执行的开发任务清单</p>

    <div class="layout">
      <!-- 左侧：输入区 -->
      <div class="input-section">
        <label>📝 粘贴 PRD 内容</label>
        <textarea
          class="prd-input"
          id="prdInput"
          placeholder="在此粘贴 PRD 文本...
支持格式：标题用 ## 或 ### 开头，功能点用 - 或 1. 列表，中英文均可"
        ></textarea>

        <button class="example-btn" id="btnExample">📥 加载示例</button>
        <button class="import-btn" id="btnImport">📂 导入文档</button>
        <input type="file" id="fileInput" accept=".txt,.md,.csv">

        <div class="btn-row">
          <button class="btn-convert" id="btnConvert">⚡ 规则引擎拆解</button>
          <button class="btn-ai" id="btnAI" disabled>🤖 AI 智能解析</button>
        </div>

        <div class="api-key-row">
          <input
            type="password"
            class="api-key-input"
            id="apiKeyInput"
            placeholder="粘贴 DeepSeek API Key（sk-...）"
          >
          <button class="api-key-save" id="btnSaveKey">💾 保存</button>
        </div>
        <div class="api-key-status" id="apiKeyStatus"></div>

        <div class="export-bar">
          <button class="btn-export" id="btnExportMD">📥 Markdown</button>
          <button class="btn-export" id="btnExportCSV">📊 CSV</button>
          <button class="btn-export" id="btnExportTXT">📄 文本</button>
          <button class="btn-clear" id="btnClear">🔄 清空内容</button>
        </div>
      </div>

      <!-- 右侧：结果区 -->
      <div class="result-section" id="resultSection">
        <div class="summary-bar" id="summaryBar"></div>
        <div class="task-list" id="taskList">
          <p style="color:#8b949e;text-align:center;padding:40px;">👈 粘贴 PRD 后点击解析，结果会显示在这里</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // 示例 PRD —— 点击加载，供你测试
    // ============================================================
    const EXAMPLE_PRD = `## 用户反馈智能分类系统

### 功能需求
- 支持从 CSV 文件导入用户反馈数据
- 自动识别反馈类型（Bug、功能建议、体验问题、其他）
- 按优先级自动排序（紧急程度 × 影响范围）
- 生成可视化分类报表（饼图 + 趋势图）
- 支持关键词搜索和手动修正分类

### 非功能需求
- 单次导入支持最多 10000 条反馈
- 分类准确率 ≥ 85%
- 页面加载时间 < 2 秒
- 支持 Chrome 和 Edge 浏览器

### 用户权限
- 管理员可以配置分类规则
- 普通用户只能查看和导出
- 支持企业微信扫码登录`;

    // ============================================================
    // PRD 解析引擎 —— 核心算法
    // 把自然语言 PRD 拆成结构化任务
    // ============================================================

    function parsePRD(text) {
      if (!text.trim()) return [];

      const tasks = [];
      let currentSection = '';

      // 按行处理
      const lines = text.split('\n');

      lines.forEach((line) => {
        const trimmed = line.trim();
        if (!trimmed) return;

        // 检测章节标题
        // ## 开头 = 一级章节
        if (trimmed.startsWith('## ')) {
          currentSection = trimmed.replace('## ', '').trim();
          return;
        }
        // ### 开头 = 二级章节
        if (trimmed.startsWith('### ')) {
          currentSection = trimmed.replace('### ', '').trim();
          return;
        }

        // 检测功能点：以 - 或 数字. 或 • 开头
        const featureMatch = trimmed.match(/^[-•*]\s+(.+)/);
        const numMatch = trimmed.match(/^(\d+)[.、)]\s*(.+)/);

        let taskText = '';
        if (featureMatch) {
          taskText = featureMatch[1];
        } else if (numMatch) {
          taskText = numMatch[2];
        }

        if (taskText) {
          const task = buildTask(taskText, currentSection);
          tasks.push(task);
        }
      });

      // 按优先级排序
      tasks.sort((a, b) => {
        const pOrder = { P0: 0, P1: 1, P2: 2 };
        return pOrder[a.priority] - pOrder[b.priority];
      });

      return tasks;
    }

    function buildTask(text, section) {
      // 确定任务类型
      let type = '功能开发';
      const lower = text.toLowerCase();

      if (section.includes('非功能') || section.includes('性能')) {
        type = '性能优化';
      } else if (section.includes('权限') || section.includes('登录') || section.includes('认证')) {
        type = '权限认证';
      } else if (text.includes('报表') || text.includes('图表') || text.includes('可视化')) {
        type = '数据可视化';
      } else if (text.includes('导入') || text.includes('导出') || text.includes('上传')) {
        type = '数据处理';
      } else if (text.includes('搜索') || text.includes('筛选')) {
        type = '搜索筛选';
      }

      // 估算工时（基于关键词）
      let hours = 8; // 默认 1 天
      if (text.includes('登录') || text.includes('扫码')) hours = 16;
      else if (text.includes('报表') || text.includes('图表') || text.includes('可视化')) hours = 24;
      else if (text.includes('导入') || text.includes('导出')) hours = 16;
      else if (text.includes('搜索')) hours = 10;
      else if (text.includes('权限') || text.includes('管理员')) hours = 12;
      else if (text.includes('规则') || text.includes('配置')) hours = 14;

      // 确定优先级
      let priority = 'P2';
      if (text.includes('核心') || text.includes('必须') || section.includes('功能需求')) {
        priority = 'P1';
      }
      if (text.includes('登录') || text.includes('权限') || text.includes('安全')) {
        priority = 'P0';
      }
      if (text.includes('准确率') || text.includes('加载') || text.includes('性能')) {
        priority = 'P1';
      }

      return {
        title: text,
        type,
        hours,
        priority,
        section,
      };
    }

    // ============================================================
    // 渲染结果
    // ============================================================

    function renderResults(tasks) {
      const summaryBar = document.getElementById('summaryBar');
      const taskList = document.getElementById('taskList');

      if (tasks.length === 0) {
        summaryBar.innerHTML = '';
        taskList.innerHTML = '<p style="color:#8b949e;text-align:center;padding:20px;">没有识别到任务项。请确保 PRD 包含 - 或 1. 开头的功能点。</p>';
        return;
      }

      // 统计摘要
      const totalHours = tasks.reduce((sum, t) => sum + t.hours, 0);
      const p0Count = tasks.filter(t => t.priority === 'P0').length;
      const p1Count = tasks.filter(t => t.priority === 'P1').length;
      const p2Count = tasks.filter(t => t.priority === 'P2').length;

      summaryBar.innerHTML = `
        <div class="summary-item">
          <div class="s-num">${tasks.length}</div>
          <div>任务总数</div>
        </div>
        <div class="summary-item">
          <div class="s-num">${totalHours}h</div>
          <div>预估总工时</div>
        </div>
        <div class="summary-item">
          <div class="s-num">${Math.ceil(totalHours / 8)}天</div>
          <div>预估工期</div>
        </div>
        <div class="summary-item">
          <div class="s-num" style="color:#f85149;">${p0Count}</div>
          <div>P0 紧急</div>
        </div>
        <div class="summary-item">
          <div class="s-num" style="color:#d29922;">${p1Count}</div>
          <div>P1 重要</div>
        </div>
      `;

      // 任务卡片
      taskList.innerHTML = tasks.map((t, i) => `
        <div class="task-card">
          <div class="task-header">
            <span class="task-title">${i + 1}. ${t.title}</span>
            <span class="task-estimate">⏱ ${t.hours}h</span>
          </div>
          <div class="task-desc">📂 ${t.section || '未分类'}</div>
          <div class="task-tags">
            <span class="tag tag-type">${t.type}</span>
            <span class="tag tag-${t.priority.toLowerCase()}">${t.priority}</span>
          </div>
        </div>
      `).join('');
    }

    // ============================================================
    // 导出函数
    // ============================================================

    function buildSummary(tasks) {
      const totalHours = tasks.reduce((sum, t) => sum + t.hours, 0);
      return { totalHours, totalDays: Math.ceil(totalHours / 8) };
    }

    function getDateStr() {
      return new Date().toISOString().slice(0, 10);
    }

    function downloadFile(content, filename, mimeType) {
      const blob = new Blob(['\uFEFF' + content], { type: mimeType });
      // \uFEFF = BOM 头，确保 Excel 打开 CSV 时中文不乱码
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportMarkdown(tasks) {
      const { totalHours, totalDays } = buildSummary(tasks);
      let md = '# 开发任务清单\n\n';
      md += `> 自动生成 · ${new Date().toLocaleDateString('zh-CN')}\n\n`;
      md += `- **任务总数**：${tasks.length}\n`;
      md += `- **预估工时**：${totalHours}h（约 ${totalDays} 天）\n\n`;
      md += '---\n\n';

      tasks.forEach((t, i) => {
        md += `## ${i + 1}. ${t.title}\n\n`;
        md += `| 属性 | 值 |\n|------|----|\n`;
        md += `| 类型 | ${t.type} |\n`;
        md += `| 优先级 | ${t.priority} |\n`;
        md += `| 预估工时 | ${t.hours}h |\n`;
        md += `| 所属模块 | ${t.section || '-'} |\n\n`;
      });

      downloadFile(md, `开发任务清单_${getDateStr()}.md`, 'text/markdown');
    }

    function exportCSV(tasks) {
      // CSV = Comma-Separated Values，逗号分隔，Excel 直接打开
      let csv = '序号,任务名称,类型,优先级,预估工时(h),所属模块\n';
      tasks.forEach((t, i) => {
        // 用引号包裹含逗号的字段，防止被错误拆分
        csv += `${i + 1},"${t.title}",${t.type},${t.priority},${t.hours},"${t.section || ''}"\n`;
      });
      downloadFile(csv, `开发任务清单_${getDateStr()}.csv`, 'text/csv');
    }

    function exportText(tasks) {
      const { totalHours, totalDays } = buildSummary(tasks);
      let txt = '开发任务清单\n';
      txt += '═'.repeat(40) + '\n\n';
      txt += `任务总数：${tasks.length}    预估工时：${totalHours}h（约${totalDays}天）\n\n`;

      tasks.forEach((t, i) => {
        txt += `[${t.priority}] ${i + 1}. ${t.title}\n`;
        txt += `    类型：${t.type}  |  工时：${t.hours}h  |  模块：${t.section || '-'}\n\n`;
      });
      downloadFile(txt, `开发任务清单_${getDateStr()}.txt`, 'text/plain');
    }

    // ============================================================
    // 事件绑定
    // ============================================================

    let currentTasks = [];

    document.getElementById('btnConvert').addEventListener('click', () => {
      const text = document.getElementById('prdInput').value;
      currentTasks = parsePRD(text);
      renderResults(currentTasks);
    });

    document.getElementById('btnExample').addEventListener('click', () => {
      document.getElementById('prdInput').value = EXAMPLE_PRD;
    });

    // 文件导入
    document.getElementById('btnImport').addEventListener('click', () => {
      document.getElementById('fileInput').click();
    });
    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('prdInput').value = ev.target.result;
      };
      reader.readAsText(file, 'UTF-8');
    });

    document.getElementById('btnExportMD').addEventListener('click', () => {
      if (currentTasks.length > 0) exportMarkdown(currentTasks);
    });
    document.getElementById('btnExportCSV').addEventListener('click', () => {
      if (currentTasks.length > 0) exportCSV(currentTasks);
    });
    document.getElementById('btnExportTXT').addEventListener('click', () => {
      if (currentTasks.length > 0) exportText(currentTasks);
    });

    document.getElementById('btnClear').addEventListener('click', () => {
      document.getElementById('prdInput').value = '';
      document.getElementById('summaryBar').innerHTML = '';
      document.getElementById('taskList').innerHTML = '<p style="color:#8b949e;text-align:center;padding:40px;">👈 粘贴 PRD 后点击解析，结果会显示在这里</p>';
      currentTasks = [];
    });

    // ============================================================
    // AI 解析 —— 调用 DeepSeek API
    // ============================================================

    const apiKeyInput = document.getElementById('apiKeyInput');
    const apiKeyStatus = document.getElementById('apiKeyStatus');
    const btnAI = document.getElementById('btnAI');
    const btnSaveKey = document.getElementById('btnSaveKey');

    // 页面加载时从 localStorage 恢复 API Key
    const savedKey = localStorage.getItem('deepseek_api_key');
    if (savedKey) {
      apiKeyInput.value = savedKey;
      apiKeyStatus.textContent = '✅ API Key 已就绪';
      btnAI.disabled = false;
      btnAI.textContent = '🤖 AI 智能解析';
    }

    // 保存 API Key
    btnSaveKey.addEventListener('click', () => {
      const key = apiKeyInput.value.trim();
      if (key.startsWith('sk-')) {
        localStorage.setItem('deepseek_api_key', key);
        apiKeyStatus.textContent = '✅ API Key 已就绪';
        apiKeyStatus.style.color = '#238636';
        btnAI.disabled = false;
        btnAI.textContent = '🤖 AI 智能解析';
      } else {
        apiKeyStatus.textContent = '❌ 无效的 Key（应以 sk- 开头）';
        apiKeyStatus.style.color = '#f85149';
      }
    });

    // AI 解析按钮
    btnAI.addEventListener('click', async () => {
      const text = document.getElementById('prdInput').value.trim();
      if (!text) return;

      const key = localStorage.getItem('deepseek_api_key');
      if (!key) {
        apiKeyStatus.textContent = '❌ 请先粘贴并保存 API Key';
        apiKeyStatus.style.color = '#f85149';
        return;
      }

      // 显示加载状态
      btnAI.disabled = true;
      btnAI.innerHTML = '<span class="loading-spinner"></span> AI 正在理解需求...';
      document.getElementById('summaryBar').innerHTML = '';
      document.getElementById('taskList').innerHTML =
        '<p style="color:#8b949e;text-align:center;padding:40px;">🤖 AI 正在分析 PRD 内容，请稍候...</p>';

      try {
        const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${key}`,
          },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [
              {
                role: 'system',
                content: `你是一个资深技术经理。分析用户提供的 PRD 文本，拆解为开发任务清单。
返回纯 JSON 数组（不要 markdown 标记，不要代码块），每个元素格式：
{"title":"任务名称","type":"功能开发|性能优化|数据处理|权限认证|搜索筛选|数据可视化","priority":"P0|P1|P2","hours":数字,"section":"所属模块"}
规则：
- 每个功能点拆成独立任务
- P0=登录/权限/安全/核心流程，P1=主要功能，P2=辅助功能
- hours 为预估工时，小功能 4-8h，中等 12-24h，大功能 32-40h
- type 根据内容智能分类
- section 取 PRD 中对应的章节名
- 只返回 JSON 数组，不要任何其他文字`
              },
              {
                role: 'user',
                content: text,
              },
            ],
            temperature: 0.3,
            max_tokens: 4096,
          }),
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error?.message || `HTTP ${response.status}`);
        }

        const data = await response.json();
        const aiContent = data.choices[0].message.content;

        // DeepSeek 有时会在 JSON 外面包 ```json ... ```，去掉
        let jsonStr = aiContent.trim();
        jsonStr = jsonStr.replace(/^```(?:json)?\s*\n?/i, '').replace(/\n?```$/i, '');

        const tasks = JSON.parse(jsonStr);

        if (!Array.isArray(tasks) || tasks.length === 0) {
          throw new Error('AI 返回的数据格式异常');
        }

        currentTasks = tasks;
        renderResults(tasks);

      } catch (err) {
        document.getElementById('taskList').innerHTML =
          `<p style="color:#f85149;text-align:center;padding:20px;">
            ❌ AI 解析失败：${err.message}<br>
            <span style="font-size:12px;color:#8b949e;">
              请检查 API Key 是否正确、网络是否通畅、DeepSeek 余额是否充足
            </span>
          </p>`;
        document.getElementById('summaryBar').innerHTML = '';
      } finally {
        btnAI.disabled = false;
        btnAI.innerHTML = '🤖 AI 智能解析';
      }
    });

    // 主题切换
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light');
      themeToggle.textContent = '☀️';
    }
    themeToggle.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light');
      themeToggle.textContent = isLight ? '☀️' : '🌙';
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });
  </script>

</body>

</html>
